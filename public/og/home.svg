<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="70%" cy="50%" r="55%">
      <stop offset="0" stop-color="#4f8cff" stop-opacity=".35"/>
      <stop offset="1" stop-color="#4f8cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#050914"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- dotted background grid -->
  <g fill="#1f2a4a">
    <circle cx="80" cy="80" r="1.5"/><circle cx="160" cy="80" r="1.5"/><circle cx="240" cy="80" r="1.5"/><circle cx="320" cy="80" r="1.5"/><circle cx="400" cy="80" r="1.5"/><circle cx="480" cy="80" r="1.5"/><circle cx="560" cy="80" r="1.5"/>
    <circle cx="80" cy="160" r="1.5"/><circle cx="160" cy="160" r="1.5"/><circle cx="240" cy="160" r="1.5"/><circle cx="320" cy="160" r="1.5"/><circle cx="400" cy="160" r="1.5"/><circle cx="480" cy="160" r="1.5"/>
    <circle cx="80" cy="240" r="1.5"/><circle cx="160" cy="240" r="1.5"/><circle cx="240" cy="240" r="1.5"/>
    <circle cx="80" cy="320" r="1.5"/><circle cx="160" cy="320" r="1.5"/><circle cx="240" cy="320" r="1.5"/><circle cx="320" cy="320" r="1.5"/>
    <circle cx="80" cy="400" r="1.5"/><circle cx="160" cy="400" r="1.5"/>
    <circle cx="80" cy="480" r="1.5"/><circle cx="160" cy="480" r="1.5"/><circle cx="240" cy="480" r="1.5"/><circle cx="320" cy="480" r="1.5"/><circle cx="400" cy="480" r="1.5"/>
    <circle cx="80" cy="560" r="1.5"/><circle cx="160" cy="560" r="1.5"/><circle cx="240" cy="560" r="1.5"/>
  </g>

  <!-- wordmark top-left (terminal bracket) -->
  <g font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace" font-weight="700" font-size="30">
    <text x="80" y="80" fill="#4f8cff">&lt;</text>
    <text x="100" y="80" fill="#ffffff">B</text>
    <text x="122" y="80" fill="#4f8cff">/&gt;</text>
  </g>
  <text x="160" y="80" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="600" font-size="24" fill="#cfd8ee">Blue Business</text>

  <!-- headline -->
  <g transform="translate(80 230)">
    <text font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="88" letter-spacing="-2" fill="#ffffff">
      <tspan x="0" y="0">Modernisering</tspan>
      <tspan x="0" y="100">die </tspan>
      <tspan fill="#22d3ee">samenwerkt.</tspan>
    </text>
    <text x="0" y="190" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="26" fill="#9ec2ff">Blue Business koppelt je systemen, data en mensen.</text>
  </g>

  <!-- node graph cluster right -->
  <g transform="translate(740 140)">
    <g stroke="#4f8cff" stroke-width="1.8">
      <line x1="80" y1="40" x2="220" y2="100"/>
      <line x1="80" y1="40" x2="60" y2="200"/>
      <line x1="220" y1="100" x2="60" y2="200"/>
      <line x1="220" y1="100" x2="320" y2="220"/>
      <line x1="320" y1="220" x2="60" y2="200"/>
      <line x1="320" y1="220" x2="160" y2="340"/>
      <line x1="60" y1="200" x2="160" y2="340"/>
      <line x1="160" y1="340" x2="280" y2="360"/>
      <line x1="220" y1="100" x2="280" y2="360"/>
    </g>
    <g font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace">
      <g transform="translate(80 40)"><circle r="24" fill="#0a0f1f" stroke="#22d3ee" stroke-width="2"/><text text-anchor="middle" y="6" font-size="15" fill="#22d3ee">API</text></g>
      <g transform="translate(220 100)"><circle r="30" fill="#22d3ee"/><text text-anchor="middle" y="8" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#0a0f1f">B</text></g>
      <g transform="translate(60 200)"><circle r="24" fill="#0a0f1f" stroke="#4f8cff" stroke-width="2"/><text text-anchor="middle" y="6" font-size="14" fill="#9ec2ff">CRM</text></g>
      <g transform="translate(320 220)"><circle r="24" fill="#0a0f1f" stroke="#4f8cff" stroke-width="2"/><text text-anchor="middle" y="6" font-size="14" fill="#9ec2ff">ERP</text></g>
      <g transform="translate(160 340)"><circle r="24" fill="#0a0f1f" stroke="#4f8cff" stroke-width="2"/><text text-anchor="middle" y="6" font-size="14" fill="#9ec2ff">AI</text></g>
      <g transform="translate(280 360)"><circle r="24" fill="#0a0f1f" stroke="#4f8cff" stroke-width="2"/><text text-anchor="middle" y="6" font-size="14" fill="#9ec2ff">DB</text></g>
    </g>
  </g>

  <text x="80" y="580" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="500" font-size="20" fill="#4f8cff" letter-spacing="2">BLUEBUSINESS.NL</text>
</svg>
